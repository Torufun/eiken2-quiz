<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検2級 クイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --card: #1e1e24;
    --border: #2a2a35;
    --accent: #4ade80;
    --accent2: #818cf8;
    --warn: #f59e0b;
    --danger: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  /* Header */
  header {
    width: 100%;
    max-width: 720px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .stats {
    display: flex;
    gap: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }
  .stat { color: var(--muted); }
  .stat span { color: var(--text); font-weight: 700; }

  /* Mode Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
    width: 100%;
    max-width: 720px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    font-weight: 700;
  }
  .tab.active {
    background: var(--card);
    color: var(--text);
  }
  .tab:hover:not(.active) { color: var(--text); }

  /* Progress Bar */
  .progress-wrap {
    width: 100%;
    max-width: 720px;
    margin-bottom: 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'Space Mono', monospace;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width .4s ease;
  }

  /* Card */
  .card {
    width: 100%;
    max-width: 720px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .badge.idiom { background: rgba(129,140,248,.15); color: var(--accent2); border: 1px solid rgba(129,140,248,.3); }
  .badge.vocab { background: rgba(74,222,128,.15); color: var(--accent); border: 1px solid rgba(74,222,128,.3); }

  .question-text {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.7;
    margin-bottom: 8px;
  }
  .blank { 
    display: inline-block;
    background: rgba(129,140,248,.2);
    border-bottom: 2px solid var(--accent2);
    min-width: 120px;
    height: 28px;
    vertical-align: bottom;
    border-radius: 4px 4px 0 0;
    text-align: center;
    font-style: italic;
    color: var(--accent2);
    padding: 0 8px;
  }
  .question-note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* Choices */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 24px;
  }
  .choice-btn {
    padding: 14px 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .choice-btn .num {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-width: 18px;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: rgba(129,140,248,.08);
    transform: translateY(-1px);
  }
  .choice-btn:active:not(:disabled) { transform: translateY(0); }
  .choice-btn.correct {
    border-color: var(--accent);
    background: rgba(74,222,128,.12);
    color: var(--accent);
  }
  .choice-btn.correct .num { color: var(--accent); }
  .choice-btn.wrong {
    border-color: var(--danger);
    background: rgba(248,113,113,.1);
    color: var(--danger);
  }
  .choice-btn.wrong .num { color: var(--danger); }
  .choice-btn:disabled { cursor: default; }

  /* Explanation */
  /* Timer selector */
  .timer-selector {
    display: flex;
    gap: 6px;
    width: 100%;
    max-width: 720px;
    margin-bottom: 16px;
    align-items: center;
  }
  .timer-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    margin-right: 2px;
  }
  .timer-btn {
    flex: 1;
    padding: 6px 4px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    line-height: 1.3;
  }
  .timer-btn:hover { border-color: var(--accent2); color: var(--text); }
  .timer-btn.active {
    border-color: var(--accent2);
    background: rgba(129,140,248,.12);
    color: var(--accent2);
  }

  /* Timer */
  .timer-wrap {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .timer-ring {
    position: relative; width: 44px; height: 44px; flex-shrink: 0;
  }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle.bg {
    fill: none; stroke: var(--border); stroke-width: 4;
  }
  .timer-ring circle.progress {
    fill: none; stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 113;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke .3s;
  }
  .timer-num {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Space Mono', monospace;
    font-size: 14px; font-weight: 700;
  }
  .timer-bar-wrap {
    flex: 1; height: 6px; background: var(--border);
    border-radius: 3px; overflow: hidden;
  }
  .timer-bar {
    height: 100%; border-radius: 3px;
    background: var(--accent);
    transition: width 1s linear, background .3s;
    width: 100%;
  }

  .explanation {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-top: 16px;
    font-size: 14px;
    line-height: 1.8;
    display: none;
  }
  .explanation.show { display: block; }
  .explanation .label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .explanation .answer { color: var(--accent); font-weight: 700; font-size: 16px; }
  .explanation .meaning { color: var(--text); margin-top: 4px; }
  .explanation .example { color: var(--muted); margin-top: 6px; font-style: italic; font-size: 13px; }

  /* Nav Buttons */
  .nav-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 720px;
    margin-bottom: 16px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #000;
  }
  .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent2); }
  .btn:disabled { opacity: .4; cursor: default; transform: none !important; }

  /* Loading Spinner */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px;
    gap: 16px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Score Summary */
  .summary {
    width: 100%;
    max-width: 720px;
    text-align: center;
    padding: 40px 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .summary h2 { font-size: 28px; margin-bottom: 8px; }
  .score-big {
    font-family: 'Space Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin: 16px 0;
  }
  .score-detail { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .score-item {
    background: var(--surface);
    border-radius: 10px;
    padding: 16px;
  }
  .score-item .label { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 4px; }
  .score-item .value { font-size: 24px; font-weight: 700; }
  .score-item.idiom .value { color: var(--accent2); }
  .score-item.vocab .value { color: var(--accent); }
  .score-item.correct-s .value { color: var(--accent); }
  .score-item.wrong-s .value { color: var(--danger); }

  /* Error */
  .error-box {
    background: rgba(248,113,113,.1);
    border: 1px solid var(--danger);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--danger);
    font-size: 14px;
    width: 100%;
    max-width: 720px;
    text-align: center;
  }

  /* Review panel */
  .review-panel {
    width: 100%;
    max-width: 720px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
    display: none;
  }
  .review-panel.show { display: block; }
  .review-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: rgba(248,113,113,.08);
    border-bottom: 1px solid var(--border);
  }
  .review-header h3 {
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    color: var(--danger);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .review-count { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; color: var(--danger); }
  .review-actions { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .review-actions .btn { flex: none; padding: 8px 16px; font-size: 13px; }
  .review-list { max-height: 380px; overflow-y: auto; }
  .review-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .review-item:last-child { border-bottom: none; }
  .review-item:hover { background: rgba(255,255,255,.03); }
  .review-item-left { flex: 1; min-width: 0; }
  .review-item-word { font-weight: 700; font-size: 15px; color: var(--text); margin-bottom: 3px; }
  .review-item-meaning { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .review-item-ex { font-size: 12px; color: var(--muted); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .review-item-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; min-width: 60px; }
  .review-item-badge { font-size: 10px; font-family: 'Space Mono', monospace; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; }
  .review-item-badge.idiom { background: rgba(129,140,248,.15); color: var(--accent2); border: 1px solid rgba(129,140,248,.3); }
  .review-item-badge.vocab { background: rgba(74,222,128,.15); color: var(--accent); border: 1px solid rgba(74,222,128,.3); }
  .miss-count { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--danger); }
  .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px 4px; line-height: 1; transition: color .15s; }
  .remove-btn:hover { color: var(--danger); }
  .review-mode-banner {
    width: 100%; max-width: 720px;
    background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3);
    border-radius: 10px; padding: 10px 16px; font-size: 13px; color: var(--danger);
    display: none; align-items: center; justify-content: space-between;
    margin-bottom: 12px; font-family: 'Space Mono', monospace;
  }
  .review-mode-banner.show { display: flex; }
  .review-mode-banner button {
    background: none; border: 1px solid var(--danger); color: var(--danger);
    border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: 'Space Mono', monospace;
  }
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 20px; font-size: 13px; color: var(--text);
    transition: transform .3s ease; z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Lesson complete screen */
  .lesson-complete {
    width: 100%; max-width: 720px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 36px 32px;
    text-align: center; display: none; position: relative; overflow: hidden;
  }
  .lesson-complete::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }
  .lesson-complete.show { display: block; }
  .lc-lesson-num {
    font-family: 'Space Mono', monospace; font-size: 12px;
    color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
  }
  .lc-title { font-size: 26px; font-weight: 900; margin-bottom: 8px; }
  .lc-range { font-size: 13px; color: var(--muted); margin-bottom: 20px; font-family: 'Space Mono', monospace; }
  .lc-range strong { color: var(--text); }
  .lc-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;
  }
  .lc-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 8px;
  }
  .lc-stat .lcs-label { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 4px; }
  .lc-stat .lcs-val { font-size: 28px; font-weight: 700; font-family: 'Space Mono', monospace; }
  .lc-stat.c-ok .lcs-val { color: var(--accent); }
  .lc-stat.c-ng .lcs-val { color: var(--danger); }
  .lc-stat.c-rt .lcs-val { color: var(--accent2); }
  .lc-prog-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 24px; }
  .lc-prog-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width .6s ease; }
  @media (max-width: 480px) {
    .choices { grid-template-columns: 1fr; }
    .card { padding: 20px; }
    .question-text { font-size: 17px; }
    .score-grid { grid-template-columns: 1fr 1fr; }
    .review-item-ex { display: none; }
  }

  /* ===== LESSON MAP ===== */
  .map-panel {
    width: 100%; max-width: 720px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    margin-bottom: 16px; display: none;
  }
  .map-panel.show { display: block; }
  .map-header {
    padding: 16px 20px; background: rgba(129,140,248,.08);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .map-header h3 {
    font-family: 'Space Mono', monospace; font-size: 13px;
    color: var(--accent2); letter-spacing: 1px; text-transform: uppercase;
  }
  .map-close-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer;
    font-family: 'Space Mono', monospace; transition: all .15s;
  }
  .map-close-btn:hover { border-color: var(--accent2); color: var(--text); }
  .map-legend {
    display: flex; gap: 16px; padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
    flex-wrap: wrap;
  }
  .map-legend span { display: flex; align-items: center; gap: 5px; }
  .map-legend i {
    display: inline-block; width: 12px; height: 12px; border-radius: 3px;
  }
  .map-progress-bar {
    height: 4px; background: var(--border); margin: 0 20px 12px;
    border-radius: 2px; overflow: hidden;
  }
  .map-progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width .5s ease;
  }
  .map-progress-label {
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
    padding: 0 20px 8px; display: flex; justify-content: space-between;
  }
  .map-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
    padding: 4px 16px 16px;
  }
  .map-cell {
    aspect-ratio: 1;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
    cursor: default; position: relative; transition: transform .15s;
    border: 1.5px solid transparent;
  }
  .map-cell:hover { transform: scale(1.12); z-index: 2; }
  .map-cell.done {
    background: linear-gradient(135deg, rgba(74,222,128,.22), rgba(52,211,153,.12));
    border-color: rgba(74,222,128,.5);
    color: var(--accent);
    overflow: hidden;
  }
  .map-cell.done .cell-num {
    font-size: 8px; opacity: .7; line-height: 1;
    position: absolute; bottom: 3px; left: 0; right: 0; text-align: center;
  }
  .map-cell.done .cell-stamp {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
  }
  .map-cell.done .cell-stamp svg {
    width: 62%; height: 62%;
    filter: drop-shadow(0 1px 3px rgba(74,222,128,.6));
    animation: stamp-pop .35s cubic-bezier(.17,.67,.35,1.4) both;
  }
  .map-cell.current {
    background: rgba(129,140,248,.25); border-color: var(--accent2);
    color: var(--accent2); box-shadow: 0 0 8px rgba(129,140,248,.35);
    animation: pulse-cell 1.8s ease-in-out infinite;
  }
  .map-cell.current .cell-num {
    font-size: 9px; font-weight: 700;
  }
  .map-cell.locked {
    background: rgba(255,255,255,.03); border-color: var(--border);
    color: var(--muted);
  }
  @keyframes pulse-cell {
    0%,100% { box-shadow: 0 0 6px rgba(129,140,248,.3); }
    50%      { box-shadow: 0 0 14px rgba(129,140,248,.6); }
  }
  @keyframes stamp-pop {
    0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
    70%  { transform: scale(1.15) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .map-stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    padding: 0 16px 16px;
  }
  .map-stat-box {
    background: var(--surface); border-radius: 8px; padding: 10px 8px;
    text-align: center; border: 1px solid var(--border);
  }
  .map-stat-box .msb-label {
    font-family: 'Space Mono', monospace; font-size: 9px;
    color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
    margin-bottom: 4px;
  }
  .map-stat-box .msb-val {
    font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700;
  }
  .map-stat-box.s-done .msb-val { color: var(--accent); }

// ===== STATE =====
const LESSON_SIZE = 20;
let mode = 'mix';
let qNum = 0;
let correct = 0;
let wrong = 0;
let streak = 0;
let bestStreak = 0;
let idiomCorrect = 0;
let vocabCorrect = 0;
let idiomTotal = 0;
let vocabTotal = 0;
let answered = false;
let currentQ = null;
let lessonNum = 1;
let lessonCorrect = 0;
let lessonWrong = 0;
let usedIdioms = [];
let usedVocab = [];

// Timer state
let TIMER_SECONDS = 10;   // changeable by user
let timerEnabled = true;  // false when set to "なし"
let timerInterval = null;
let timerLeft = TIMER_SECONDS;

// ===== REVIEW STATE =====
// reviewList: Map of item.e -> {item, type, missCount}
let reviewList = new Map();
let isReviewMode = false;
let reviewPool = [];
let usedReview = [];

// ===== REVIEW: persistence via localStorage =====
function saveReview() {
  try {
    const obj = {};
    reviewList.forEach((v, k) => { obj[k] = v; });
    localStorage.setItem('eiken2_review', JSON.stringify(obj));
  } catch(e) {}
}
function loadReview() {
  try {
    const raw = localStorage.getItem('eiken2_review');
    if (!raw) return;
    const obj = JSON.parse(raw);
    Object.entries(obj).forEach(([k, v]) => reviewList.set(k, v));
    updateReviewUI();
  } catch(e) {}
}

function addToReview(item, type) {
  const key = item.e;
  if (reviewList.has(key)) {
    reviewList.get(key).missCount++;
  } else {
    reviewList.set(key, { item, type, missCount: 1 });
  }
  saveReview();
  updateReviewUI();
}

function removeFromReview(key) {
  reviewList.delete(key);
  saveReview();
  updateReviewUI();
  renderReviewList();
}

function clearReviewList() {
  if (!confirm('間違いリストをすべて削除しますか？')) return;
  reviewList.clear();
  saveReview();
  updateReviewUI();
  renderReviewList();
  showToast('🗑 リストをクリアしました');
}

function updateReviewUI() {
  const count = reviewList.size;
  // Tab badge
  const badge = document.getElementById('reviewTabCount');
  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
  // Panel count
  const pc = document.getElementById('reviewPanelCount');
  if (pc) pc.textContent = count;
  // Start review btn
  const btn = document.getElementById('startReviewBtn');
  if (btn) btn.disabled = count === 0;
}

function renderReviewList() {
  const list = document.getElementById('reviewList');
  if (!list) return;
  if (reviewList.size === 0) {
    list.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted);font-size:14px;">間違えた問題はまだありません 🎉</div>';
    return;
  }
  // Sort by missCount desc
  const entries = [...reviewList.entries()].sort((a,b) => b[1].missCount - a[1].missCount);
  list.innerHTML = entries.map(([key, {item, type, missCount}]) => `
    <div class="review-item">
      <div class="review-item-left">
        <div class="review-item-word">${item.a || item.e}</div>
        <div class="review-item-meaning">${item.j}</div>
        <div class="review-item-ex">${item.ex.replace('( )', `[${item.e}]`)}</div>
      </div>
      <div class="review-item-meta">
        <span class="review-item-badge ${type}">${type === 'idiom' ? 'イディオム' : '単語'}</span>
        <span class="miss-count">✕ ${missCount}回</span>
        <button class="remove-btn" onclick="removeFromReview('${key.replace(/'/g,"\'")}')">🗑</button>
      </div>
    </div>
  `).join('');
}

// ===== REVIEW PANEL OPEN/CLOSE =====
function showReviewPanel() {
  document.getElementById('mapPanel').classList.remove('show');
  document.getElementById('mapTab').classList.remove('active');

  stopTimer();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('reviewTab').classList.add('active');
  document.getElementById('reviewPanel').classList.add('show');
  renderReviewList();
  updateReviewUI();
}

function closeReviewPanel() {
  document.getElementById('reviewPanel').classList.remove('show');
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['mix','idiom','vocab','review'][i] === mode ||
      (mode !== 'review' && ['mix','idiom','vocab'][i] === mode));
  });
  // Restore active tab highlight
  const modeIdx = {mix:0, idiom:1, vocab:2}[mode] ?? 0;
  document.querySelectorAll('.tab')[modeIdx].classList.add('active');
}

// ===== REVIEW MODE =====
function startReviewMode() {
  if (reviewList.size === 0) { showToast('間違えた問題がありません'); return; }
  isReviewMode = true;
  reviewPool = [...reviewList.values()].map(v => v.item);
  usedReview = [];
  qNum = 0; correct = 0; wrong = 0; streak = 0;
  updateStats();
  closeReviewPanel();
  document.getElementById('lessonComplete').classList.remove('show');
  document.getElementById('mainArea').style.display = '';
  document.querySelectorAll('.nav-row').forEach(el => el.style.display = '');
  document.getElementById('reviewBanner').classList.add('show');
  generateQuestion();
}

function exitReviewMode() {
  isReviewMode = false;
  reviewPool = [];
  usedReview = [];
  // Keep lesson state — return to current lesson position
  qNum = 0; correct = 0; wrong = 0; streak = 0;
  lessonCorrect = 0; lessonWrong = 0;
  document.getElementById('reviewBanner').classList.remove('show');
  document.getElementById('lessonComplete').classList.remove('show');
  document.getElementById('mainArea').style.display = '';
  document.querySelectorAll('.nav-row').forEach(el => el.style.display = '');
  updateStats();
  generateQuestion();
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===== INIT =====
function setMode(m) {
  if (isReviewMode) exitReviewMode();
  mode = m;
  document.getElementById('reviewPanel').classList.remove('show');
  document.getElementById('lessonComplete').classList.remove('show');
  document.getElementById('mainArea').style.display = '';
  document.querySelectorAll('.nav-row').forEach(el => el.style.display = '');
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['mix','idiom','vocab','review'][i] === m);
  });
  qNum = 0; correct = 0; wrong = 0; streak = 0;
  lessonNum = 1; lessonCorrect = 0; lessonWrong = 0;
  idiomCorrect = 0; vocabCorrect = 0; idiomTotal = 0; vocabTotal = 0;
  usedIdioms = []; usedVocab = [];
  updateStats();
  generateQuestion();
}

function pickRandom(arr, used) {
  if (used.length >= arr.length) used.length = 0;
  let available = arr.filter((_,i) => !used.includes(i));
  let idx = arr.indexOf(available[Math.floor(Math.random() * available.length)]);
  used.push(idx);
  return {item: arr[idx], idx};
}

function generateQuestion() {
  stopTimer();
  if (!isReviewMode && qNum >= LESSON_SIZE) {
    showLessonComplete();
    return;
  }
  answered = false;
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('skipBtn').disabled = false;
  qNum++;

  let item, type, pool;

  if (isReviewMode) {
    // Review mode: pick from wrong items
    if (reviewPool.length === 0) {
      showToast('復習リストが空になりました！');
      exitReviewMode();
      return;
    }
    if (usedReview.length >= reviewPool.length) usedReview = [];
    let available = reviewPool.filter((_,i) => !usedReview.includes(i));
    let ri = reviewPool.indexOf(available[Math.floor(Math.random() * available.length)]);
    usedReview.push(ri);
    item = reviewPool[ri];
    type = reviewList.get(item.e)?.type || 'vocab';
    pool = type === 'idiom' ? IDIOMS_EIKEN2 : VOCAB_EIKEN2;
  } else {
    if (mode === 'idiom') type = 'idiom';
    else if (mode === 'vocab') type = 'vocab';
    else type = Math.random() < 0.5 ? 'idiom' : 'vocab';
    pool = type === 'idiom' ? IDIOMS_EIKEN2 : VOCAB_EIKEN2;
    let used = type === 'idiom' ? usedIdioms : usedVocab;
    let picked = pickRandom(pool, used);
    item = picked.item;
    if (type === 'idiom') idiomTotal++;
    else vocabTotal++;
  }

  let display = item.ex.replace('( )', '<span class="blank">　　　　</span>');
  let others = pool.filter(x => x.e !== item.e);
  let wrongs = [];
  while (wrongs.length < 3) {
    let r = others[Math.floor(Math.random() * others.length)];
    if (!wrongs.find(w => w.e === r.e)) wrongs.push(r);
  }
  let choices = [item, ...wrongs].sort(() => Math.random() - .5);
  // Detect if blank is at sentence start
  const sentenceStart = item.ex.trim().startsWith('( )');
  currentQ = {item, choices, type, display, sentenceStart};
  renderQuestion();
}

// ===== TIMER =====
function setTimerSecs(secs) {
  stopTimer();
  // Update active button
  [10, 15, 20, 0].forEach(v => {
    const id = v === 0 ? 'tbtnOff' : `tbtn${v}`;
    const btn = document.getElementById(id);
    if (btn) btn.classList.toggle('active', v === secs);
  });

  if (secs === 0) {
    timerEnabled = false;
    TIMER_SECONDS = 10; // fallback default
    // Hide timer UI if visible
    const tw = document.querySelector('.timer-wrap');
    if (tw) tw.style.display = 'none';
  } else {
    timerEnabled = true;
    TIMER_SECONDS = secs;
    const tw = document.querySelector('.timer-wrap');
    if (tw) tw.style.display = '';
    // Restart timer for current question if mid-question
    if (!answered && document.getElementById('timerCircle')) {
      startTimer();
    }
  }
}

function startTimer() {
  stopTimer();
  if (!timerEnabled) return;

  // Show timer UI
  const tw = document.querySelector('.timer-wrap');
  if (tw) tw.style.display = '';

  timerLeft = TIMER_SECONDS;
  updateTimerUI(timerLeft);

  timerInterval = setInterval(() => {
    timerLeft--;
    updateTimerUI(timerLeft);

    if (timerLeft <= 0) {
      stopTimer();
      timeUp();
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function updateTimerUI(secs) {
  const numEl = document.getElementById('timerNum');
  const circleEl = document.getElementById('timerCircle');
  const barEl = document.getElementById('timerBar');
  if (!numEl) return;

  const pct = secs / TIMER_SECONDS;
  // Circle: circumference = 2π×18 ≈ 113
  const circ = 113;
  const offset = circ * (1 - pct);

  numEl.textContent = secs;

  // Color transitions: green→yellow→red
  let color;
  if (pct > 0.5) color = 'var(--accent)';       // green
  else if (pct > 0.25) color = 'var(--warn)';    // yellow
  else color = 'var(--danger)';                   // red

  if (circleEl) {
    circleEl.style.strokeDashoffset = offset;
    circleEl.style.stroke = color;
  }
  if (barEl) {
    barEl.style.width = (pct * 100) + '%';
    barEl.style.background = color;
  }
  if (numEl) numEl.style.color = color;
}

function timeUp() {
  if (answered) return;
  answered = true;

  // Count as wrong, add to review
  const {item, type} = currentQ;
  wrong++; lessonWrong++;
  streak = 0;
  addToReview(item, type);

  // Highlight correct answer in red border, show it
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('choice' + i);
    if (!btn) continue;
    btn.disabled = true;
    if (currentQ.choices[i].e === item.e) btn.classList.add('correct');
  }

  // Show explanation with time-up message
  const exp = document.getElementById('explanation');
  if (exp) {
    exp.classList.add('show');
    const {sentenceStart} = currentQ;
    const ans = getLabel(item, sentenceStart);
    exp.innerHTML = `
      <div class="label" style="color:var(--warn);">⏰ 時間切れ！次の問題へ自動で進みます</div>
      <div class="answer">${ans}</div>
      <div class="meaning">意味：${item.j}</div>
      <div class="example">例文：${item.ex.replace('( )', '<strong>' + ans + '</strong>')}</div>
    `;
  }

  updateStats();

  // Auto-advance after 1.5s
  setTimeout(() => {
    if (!timerInterval) generateQuestion();
  }, 1500);
}

// Helper: get display label for a choice (use a: if present, else e:)
// capitalize: when the answer appears at sentence start
function getLabel(item, capitalize) {
  const label = item.a || item.e;
  if (capitalize && label.length > 0) {
    return label.charAt(0).toUpperCase() + label.slice(1);
  }
  return label;
}

function renderQuestion() {
  const {item, choices, type, display, sentenceStart} = currentQ;
  const area = document.getElementById('mainArea');

  area.innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <div class="badge ${type}" style="margin-bottom:0;">${type === 'idiom' ? '📚 イディオム' : '📖 単語'}</div>
        <div class="timer-wrap" style="margin-bottom:0;flex:1;margin-left:12px;">
          <div class="timer-ring">
            <svg width="44" height="44" viewBox="0 0 44 44">
              <circle class="bg" cx="22" cy="22" r="18"/>
              <circle class="progress" id="timerCircle" cx="22" cy="22" r="18"/>
            </svg>
            <span class="timer-num" id="timerNum">10</span>
          </div>
          <div class="timer-bar-wrap">
            <div class="timer-bar" id="timerBar"></div>
          </div>
        </div>
      </div>
      <div class="question-text">${display}</div>
      <div class="question-note">空欄に入る最も適切なものを1〜4から選びなさい。</div>
      <div class="choices" id="choices">
        ${choices.map((c,i) => `
          <button class="choice-btn" onclick="selectAnswer(${i})" id="choice${i}">
            <span class="num">${i+1}</span>
            ${getLabel(c, sentenceStart)}
          </button>
        `).join('')}
      </div>
      <div class="explanation" id="explanation"></div>
    </div>
  `;

  if (isReviewMode) {
    document.getElementById('progressLabel').textContent = `復習 Q${qNum} / ${reviewPool.length}問`;
  } else {
    document.getElementById('progressLabel').textContent =
      `レッスン${lessonNum}  ·  ${qNum} / ${LESSON_SIZE}問`;
  }
  const pct = isReviewMode
    ? Math.round(qNum / Math.max(reviewPool.length,1) * 100)
    : Math.round(qNum / LESSON_SIZE * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  // Show/hide timer UI based on setting
  setTimeout(() => {
    const tw = document.querySelector('.timer-wrap');
    if (tw) tw.style.display = timerEnabled ? '' : 'none';
    startTimer();
  }, 50);
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  stopTimer();

  const {item, choices, type} = currentQ;
  const isCorrect = choices[idx].e === item.e;

  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('choice' + i);
    btn.disabled = true;
    if (choices[i].e === item.e) btn.classList.add('correct');
    else if (i === idx && !isCorrect) btn.classList.add('wrong');
  }

  if (isCorrect) {
    correct++; lessonCorrect++;
    streak++;
    if (type === 'idiom') idiomCorrect++;
    else vocabCorrect++;
    if (streak > bestStreak) bestStreak = streak;
  } else {
    wrong++; lessonWrong++;
    streak = 0;
    addToReview(item, type);
  }

  const exp = document.getElementById('explanation');
  exp.classList.add('show');
  const {sentenceStart} = currentQ;
  const ans = getLabel(item, sentenceStart);
  exp.innerHTML = `
    <div class="label">${isCorrect ? '✅ 正解！' : '❌ 間違えた問題を復習リストに追加しました'}</div>
    <div class="answer">${ans}</div>
    <div class="meaning">意味：${item.j}</div>
    <div class="example">例文：${item.ex.replace('( )', `<strong>${ans}</strong>`)}</div>
    ${!isCorrect ? `<div style="margin-top:8px;font-size:12px;color:var(--muted);">❌ 復習リストに追加 — タブから確認・復習できます</div>` : ''}
  `;

  updateStats();
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('skipBtn').disabled = true;
}

function updateStats() {
  const total = correct + wrong;
  document.getElementById('totalCount').textContent =
    isReviewMode ? qNum : `${qNum}/${LESSON_SIZE}`;
  document.getElementById('correctCount').textContent = correct;
  const acc = total > 0 ? Math.round(correct / total * 100) : '—';
  document.getElementById('accuracy').textContent = total > 0 ? acc + '%' : '—';
  document.getElementById('streak').textContent = streak;
}

// ===== LESSON FUNCTIONS =====
function showLessonComplete() {
  markLessonComplete(lessonNum);
  stopTimer();
  document.getElementById('mainArea').style.display = 'none';
  document.querySelectorAll('.nav-row').forEach(el => el.style.display = 'none');
  document.getElementById('lessonComplete').classList.add('show');

  const total = lessonCorrect + lessonWrong;
  const rate = total > 0 ? Math.round(lessonCorrect / total * 100) : 0;
  const startQ = (lessonNum - 1) * LESSON_SIZE + 1;
  const endQ = lessonNum * LESSON_SIZE;

  document.getElementById('lcNum').textContent = `LESSON ${lessonNum}`;
  document.getElementById('lcOk').textContent = lessonCorrect;
  document.getElementById('lcNg').textContent = lessonWrong;
  document.getElementById('lcRt').textContent = rate + '%';
  document.getElementById('lcRange').innerHTML =
    `出題範囲: <strong>全体の ${startQ}〜${endQ}問目</strong>`;

  setTimeout(() => {
    document.getElementById('lcFill').style.width = rate + '%';
  }, 80);

  const rc = reviewList.size;
  document.getElementById('lcRevCount').textContent = rc > 0 ? `(${rc}問)` : '';

  // Check if all items used up
  const idiomsDone = usedIdioms.length >= IDIOMS_EIKEN2.length;
  const vocabsDone = usedVocab.length >= VOCAB_EIKEN2.length;
  const allDone = mode === 'idiom' ? idiomsDone
                : mode === 'vocab' ? vocabsDone
                : idiomsDone && vocabsDone;

  const btn = document.getElementById('lcNextBtn');
  if (allDone) {
    btn.textContent = '全問完了！最初からやり直す 🔄';
    btn.onclick = () => {
      usedIdioms = []; usedVocab = [];
      lessonNum = 1;
      startNextLesson();
    };
  } else {
    btn.textContent = `レッスン ${lessonNum + 1} へ →`;
    btn.onclick = startNextLesson;
  }
}

function startNextLesson() {
  lessonNum++;
  qNum = 0; correct = 0; wrong = 0; streak = 0;
  lessonCorrect = 0; lessonWrong = 0;
  idiomCorrect = 0; vocabCorrect = 0; idiomTotal = 0; vocabTotal = 0;
  document.getElementById('lessonComplete').classList.remove('show');
  document.getElementById('mainArea').style.display = '';
  document.querySelectorAll('.nav-row').forEach(el => el.style.display = '');
  updateStats();
  generateQuestion();
}

function restartLesson() {
  // Remove last lesson's questions from used arrays so they can repeat
  const isIdiomOnly = mode === 'idiom';
  const isVocabOnly = mode === 'vocab';
  if (!isVocabOnly) usedIdioms = usedIdioms.slice(0, Math.max(0, usedIdioms.length - LESSON_SIZE));
  if (!isIdiomOnly) usedVocab = usedVocab.slice(0, Math.max(0, usedVocab.length - LESSON_SIZE));
  qNum = 0; correct = 0; wrong = 0; streak = 0;
  lessonCorrect = 0; lessonWrong = 0;
  idiomCorrect = 0; vocabCorrect = 0; idiomTotal = 0; vocabTotal = 0;
  document.getElementById('lessonComplete').classList.remove('show');
  document.getElementById('mainArea').style.display = '';
  document.querySelectorAll('.nav-row').forEach(el => el.style.display = '');
  updateStats();
  generateQuestion();
}


// ===== LESSON MAP =====
let completedLessons = new Set();
const TOTAL_LESSONS = 75;

function saveCompletedLessons() {
  try {
    localStorage.setItem('eiken2_completed', JSON.stringify([...completedLessons]));
  } catch(e) {}
}

function loadCompletedLessons() {
  try {
    const raw = localStorage.getItem('eiken2_completed');
    if (raw) completedLessons = new Set(JSON.parse(raw));
  } catch(e) {}
}

function markLessonComplete(num) {
  completedLessons.add(num);
  saveCompletedLessons();
  updateMapUI();
}

function showMapPanel() {
  // 他タブを非アクティブに
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('mapTab').classList.add('active');
  document.getElementById('reviewPanel').classList.remove('show');
  document.getElementById('mapPanel').classList.add('show');
  updateMapUI();
}

function closeMapPanel() {
  document.getElementById('mapPanel').classList.remove('show');
  document.getElementById('mapTab').classList.remove('active');
}

function updateMapUI() {
  const done = completedLessons.size;
  const left = TOTAL_LESSONS - done;
  const pct = Math.round(done / TOTAL_LESSONS * 100);

  document.getElementById('mapDone').textContent = done;
  document.getElementById('mapLeft').textContent = left;
  document.getElementById('mapPctLabel').textContent = pct + '% 完了';
  document.getElementById('mapProgressFill').style.width = pct + '%';

  // グリッド描画
  const grid = document.getElementById('mapGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= TOTAL_LESSONS; i++) {
    const cell = document.createElement('div');
    cell.className = 'map-cell';
    cell.title = `レッスン ${i}`;

    if (completedLessons.has(i)) {
      cell.classList.add('done');
      cell.innerHTML = `
        <span class="cell-stamp">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2l2.9 6.26L22 9.27l-5 5.14 1.18 7.24L12 18.3l-6.18 3.35L7 14.41 2 9.27l7.1-1.01L12 2z"
              fill="#4ade80" stroke="#4ade80" stroke-width="0" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="cell-num">${i}</span>`;
    } else if (i === lessonNum) {
      cell.classList.add('current');
      cell.innerHTML = `<span class="cell-num">${i} ▶</span>`;
    } else {
      cell.classList.add('locked');
      cell.textContent = i;
    }

    // クリックで確認
    cell.addEventListener('click', () => {
      if (completedLessons.has(i)) {
        showToast(`⭐ レッスン ${i} 完了済み！`);
      } else if (i === lessonNum) {
        closeMapPanel();
        showToast(`レッスン ${i} に挑戦中！`);
      }
    });
    grid.appendChild(cell);
  }
}

// Start
loadCompletedLessons();
loadReview();
generateQuestion();
</script>
